# Values for the custom Kafka chart

kafkaCluster:
  enabled: true
  namespace: kafka
  name: kafka
  version: 4.1.0
  image: quay.io/strimzi/kafka:0.48.0-kafka-4.1.0

  listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false
    - name: tls
      port: 9093
      type: internal
      tls: true

  nodePools:
    - name: combined
      replicas: 1
      roles: [broker, controller]
      storage:
        type: ephemeral
      resources:
        requests: { cpu: 500m, memory: 1Gi }
        limits: { cpu: 1, memory: 1.5Gi }

  config:
    offsets.topic.replication.factor: 1
    transaction.state.log.replication.factor: 1
    transaction.state.log.min.isr: 1
    auto.create.topics.enable: "true"

  entityOperator:
    resources:
      requests: { cpu: 100m, memory: 384Mi } # Lowered CPU request
      limits: { cpu: 500m, memory: 768Mi }

  metrics:
    enabled: true

kafkaTopic:
  enabled: true
  name: my-topic
  partitions: 3
  replicas: 1

kafkaUser:
  enabled: true
  name: my-user

# --- Original Strimzi Operator values below ---

replicas: 1
watchNamespaces: []
watchAnyNamespace: false
defaultImageRegistry: quay.io
defaultImageRepository: strimzi
defaultImageTag: 0.48.0

image:
  registry: ""
  repository: ""
  name: operator
  tag: ""

logVolume: co-config-volume
logConfigMap: strimzi-cluster-operator
logConfiguration: ""
logLevel: ${env:STRIMZI_LOG_LEVEL:-INFO}
fullReconciliationIntervalMs: 120000
operationTimeoutMs: 300000
kubernetesServiceDnsDomain: cluster.local
featureGates: ""
tmpDirSizeLimit: 1Mi
extraEnvs: []
tolerations: []
affinity: {}
annotations: {}
labels: {}
nodeSelector: {}
deploymentAnnotations: {}
deploymentStrategy: {}
priorityClassName: ""
podSecurityContext: {}
securityContext: {}
rbac:
  create: true
serviceAccountCreate: true
serviceAccount: strimzi-cluster-operator
leaderElection:
  enable: true
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable:
  unhealthyPodEvictionPolicy: IfHealthyBudget
dashboards:
  enabled: false

resources:
  limits:
    memory: 384Mi
    cpu: 500m
  requests:
    memory: 256Mi
    cpu: 100m

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30
readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30

createGlobalResources: true
createAggregateRoles: false