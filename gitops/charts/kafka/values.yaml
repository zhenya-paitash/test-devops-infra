# Default values for strimzi-kafka-operator.

replicas: 1

watchNamespaces: []
watchAnyNamespace: false

defaultImageRegistry: quay.io
defaultImageRepository: strimzi
defaultImageTag: 0.48.0

image:
  registry: ""
  repository: ""
  name: operator
  tag: ""
  # imagePullSecrets:
  #   - name: secretname
logVolume: co-config-volume
logConfigMap: strimzi-cluster-operator
logConfiguration: ""
logLevel: ${env:STRIMZI_LOG_LEVEL:-INFO}
fullReconciliationIntervalMs: 120000
operationTimeoutMs: 300000
kubernetesServiceDnsDomain: cluster.local
featureGates: ""
tmpDirSizeLimit: 1Mi

extraEnvs: []

tolerations: []
affinity: {}
annotations: {}
labels: {}
nodeSelector: {}
deploymentAnnotations: {}
deploymentStrategy: {}
priorityClassName: ""

podSecurityContext: {}
securityContext: {}

rbac:
  create: yes
serviceAccountCreate: yes
serviceAccount: strimzi-cluster-operator

leaderElection:
  enable: true

podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable:
  unhealthyPodEvictionPolicy: IfHealthyBudget

dashboards:
  enabled: false
  namespace: ~
  label: grafana_dashboard
  labelValue: "1"
  annotations: {}
  extraLabels: {}

# Modified resource settings for the operator itself
resources:
  limits:
    memory: 384Mi
    cpu: 500m
  requests:
    memory: 256Mi
    cpu: 100m

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30
readinessProbe:
  initialDelaySeconds: 10
  periodSeconds: 30

createGlobalResources: true
createAggregateRoles: false
labelsExclusionPattern: ""
generateNetworkPolicy: true
connectBuildTimeoutMs: 300000
generatePodDisruptionBudget: true

# --- Custom Resources Configuration ---
# These values are for the Kafka cluster, topic, and user resources
# that will be created by the operator.

kafkaCluster:
  enabled: true
  namespace: kafka
  name: kafka
  version: 4.1.0
  nodePools:
    - name: combined
      replicas: 1
      roles: [broker, controller]
      storage:
        type: ephemeral
      # --- To enable persistent storage, uncomment and configure: ---
      # type: persistent-claim
      # size: 5Gi
      # deleteClaim: false
      # class: standard
      resources:
        requests: { cpu: 200m, memory: 256Mi }
        limits: { cpu: 500m, memory: 384Mi }
  config:
    auto.create.topics.enable: "true"
    offsets.topic.replication.factor: 1
    transaction.state.log.replication.factor: 1
    transaction.state.log.min.isr: 1
  # --- To pin Kafka pods to a specific node, uncomment the following: ---
  # nodeSelector:
  #   kubernetes.io/hostname: active-bank-k8s-master
  entityOperator:
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 200m, memory: 256Mi }
  metrics:
    enabled: true

kafkaTopic:
  enabled: true
  name: my-topic
  partitions: 3
  replicas: 1

kafkaUser:
  enabled: true
  name: my-user